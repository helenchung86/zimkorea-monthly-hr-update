<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Monthly HR Report Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<!-- Firebase (공유 저장소 + 관리자 로그인) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
  :root{
    --ink:#1B2430;
    --ink-soft:#2A3444;
    --paper:#F7F4EE;
    --card:#FFFFFF;
    --teal:#2F6F6C;
    --teal-soft:#E4EEEC;
    --amber:#B8862E;
    --amber-soft:#F3E7D0;
    --slate:#6B7280;
    --hair:#DCD6C9;
    --danger:#B3492E;
    --danger-soft:#F6E4DE;
    --good:#2F6F6C;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;zoom:110%;}
  .app{display:flex;min-height:100vh;align-items:flex-start;}

  .sidebar{
  width:260px;min-width:220px;background:var(--ink);color:#EDE9DF;
  display:flex;flex-direction:column;padding:28px 18px;
  position:sticky;
  top:0;
  height:100vh;
  overflow-y:auto;
  flex-shrink:0;
}
  .brand{font-family:'Source Serif 4',serif;font-weight:700;font-size:20px;margin:0 0 2px 4px;}
  .brand-sub{font-size:12px;color:#9CA6B5;margin:0 0 22px 4px;}

  .qr-card {
    background: #ffffff;
    border: 1px solid #3A4557;
    border-radius: 10px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: auto;
  }

  .admin-auth-area{margin-top:12px;text-align:center;}
  .admin-auth-area a{color:#9CA6B5;font-size:11px;text-decoration:underline;cursor:pointer;}
  .admin-auth-area a:hover{color:#EDE9DF;}

  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:999;align-items:center;justify-content:center;}
  .modal-box{background:#fff;padding:24px;border-radius:10px;width:280px;}
  .modal-box h3{margin:0 0 12px;font-family:'Source Serif 4',serif;}
  .modal-box input{width:100%;margin-bottom:8px;padding:8px;border:1px solid #ccc;border-radius:6px;font-size:13px;}
  .modal-btn-row{display:flex;gap:8px;margin-top:4px;}
  .modal-btn-row button{flex:1;border:none;border-radius:6px;padding:8px;font-weight:600;cursor:pointer;font-size:13px;}
  #loginSubmitBtn{background:var(--teal);color:#fff;}
  #loginCancelBtn{background:#eee;color:var(--ink);}
  #loginError{color:var(--danger);font-size:12px;margin-top:8px;display:none;}

  .main{flex:1;min-width:0;padding:34px 42px 60px;}
  .empty-state{display:flex;flex-direction:column;align-items:flex-start;justify-content:center;height:70%;color:var(--slate);}
  .empty-state h2{font-family:'Source Serif 4',serif;color:var(--ink);}

  .main-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:26px;flex-wrap:wrap;gap:10px;}
  .main-title{font-family:'Source Serif 4',serif;font-weight:700;font-size:26px;margin:0;}
  .save-area{display:flex;align-items:center;gap:12px;}
  .save-status{font-size:12px;color:var(--slate);min-width:100px;text-align:right;}
  .btn{border:none;border-radius:7px;padding:10px 18px;font-weight:700;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;}
  .btn-ghost{background:transparent;color:var(--ink);border:1px solid #C7BFA9;}
  .btn-ghost:hover{background:#EFEADB;}

  .section-label{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--teal);font-weight:700;margin:0 0 16px;display:flex;align-items:center;gap:8px;}
  .section-label::after{content:"";flex:1;height:1px;background:var(--hair);}

  .charts-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(320px,1fr));gap:18px;margin-bottom:34px;}
  .chart-card{background:var(--card);border:1px solid var(--hair);border-radius:10px;padding:20px;}
  .chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
  .chart-title{font-size:14px;font-weight:700;color:var(--ink);}

  .budget-badge-group{display:flex;gap:6px;font-family:'JetBrains Mono',monospace;font-size:11px;}
  .budget-badge{background:var(--paper);border:1px solid var(--hair);padding:3px 8px;border-radius:5px;color:var(--slate);}
  .budget-badge.actual{background:var(--teal-soft);border-color:transparent;color:var(--teal);font-weight:700;}

  .chart-empty{color:var(--slate);font-size:12px;padding:30px 0;text-align:center;}

  .highlights-table-wrap {
    background: var(--card);
    border: 1px solid var(--hair);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .highlights-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .highlights-table th {
    background: var(--paper);
    color: var(--ink);
    font-weight: 700;
    text-align: left;
    padding: 12px 16px;
    border-bottom: 1px solid var(--hair);
  }
  .highlights-table td {
    padding: 16px;
    border-bottom: 1px solid var(--hair);
    vertical-align: top;
  }
  .highlights-table tr:last-child td {
    border-bottom: none;
  }

  .cat-header-cell {
    font-weight: 700;
    font-size: 15px;
    color: var(--teal);
    width: 180px;
  }
  .cat-header-sub {
    font-size: 11px;
    color: var(--slate);
    font-weight: 400;
    margin-top: 2px;
  }

  .summary-textarea {
    width: 100%;
    min-height: 90px;
    border: 1px solid var(--hair);
    border-radius: 6px;
    padding: 8px 10px;
    resize: vertical;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    line-height: 1.6;
    color: var(--ink);
    background: var(--paper);
  }
  .summary-textarea:focus { outline: none; border-color: var(--teal); }

  .image-attach-area {
    margin-top: 10px;
  }
  .img-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
  }
  .img-thumb-container {
    position: relative;
    width: 80px;
    height: 80px;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid var(--hair);
  }
  .img-thumb-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .img-thumb-container .img-del-btn {
    position: absolute;
    top: 2px;
    right: 2px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 18px;
    height: 18px;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .add-img-btn {
    background: var(--paper);
    border: 1px dashed var(--hair);
    color: var(--slate);
    padding: 4px 10px;
    border-radius: 5px;
    font-size: 11px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-weight: 600;
  }
  .add-img-btn:hover { border-color: var(--teal); color: var(--teal); }

  .preview-image{ cursor: zoom-in; }
  .lightbox-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(255,255,255,0.92);
    z-index:1000;
    align-items:center;
    justify-content:center;
    cursor:zoom-out;
  }
  .lightbox-overlay img{
    max-width:90vw;
    max-height:90vh;
    border-radius:8px;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
    cursor:default;
  }
  .hover-zoom-overlay{
    position: fixed;
    z-index: 9999;
    pointer-events: none;
    border: 1px solid var(--hair);
    border-radius: 8px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.3);
    background: #fff;
    padding: 6px;
    max-width: 380px;
    max-height: 380px;
  }
  .hover-zoom-overlay img{
    display: block;
    max-width: 368px;
    max-height: 368px;
    border-radius: 6px;
    object-fit: contain;
  }

  .hint{font-size:11px;color:var(--slate);margin:-4px 0 24px;}

  input:disabled, textarea:disabled, button:disabled {
    opacity: 0.6;
    cursor: not-allowed !important;
  }

  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:#C9C2AE;border-radius:4px;}
</style>
</head>
<body>
<div class="app">
  <!-- 사이드바 -->
  <div class="sidebar">
    <p class="brand">ZIM Korea</p>
    <p class="brand-sub">HR Monthly Report</p>

    <div style="padding: 10px 0;">
  <label for="monthSelect" style="display: block; font-size: 12px; color: var(--slate); margin-bottom: 6px;">Select Month</label>
  <div style="display:flex; gap:6px;">
    <select id="monthSelect" style="flex:1; padding: 10px 12px; border-radius: 8px; background: rgba(255,255,255,0.08); color: #fff; border: 1px solid rgba(255,255,255,0.15); font-size: 14px; outline: none; cursor: pointer;">
    </select>
    <button id="deleteMonthBtn" title="Delete this month" style="display:none; background:var(--danger); color:#fff; border:none; border-radius:6px; padding:0 12px; font-weight:700; cursor:pointer; font-size:13px;">🗑</button>
  </div>
</div>

    <div id="addMonthArea"></div>

    <div class="qr-card">
      <img src="Picture1.jpg" alt="ZIM" onError="this.onerror=null; this.src='picture1.jpg';" style="max-width: 100%; height: auto; display: block; border-radius: 6px;">
    </div>

    <div class="admin-auth-area">
      <a id="adminLoginLink">Admin Login</a>
    </div>
  </div>

  <!-- 로그인 모달 -->
  <div class="modal-overlay" id="loginModalOverlay">
    <div class="modal-box">
      <h3>Admin Login</h3>
      <input type="email" id="loginEmail" placeholder="Email">
      <input type="password" id="loginPassword" placeholder="Password">
      <div class="modal-btn-row">
        <button id="loginSubmitBtn">Login</button>
        <button id="loginCancelBtn">Cancel</button>
      </div>
      <p id="loginError"></p>
    </div>
  </div>

  <!-- 이미지 크게 보기 -->
  <div class="lightbox-overlay" id="imageLightboxOverlay" onclick="closeImageLightbox()">
    <img id="lightboxImg" onclick="event.stopPropagation()">
  </div>

  <div class="main" id="main">
    <div class="empty-state"><h2>Loading…</h2></div>
  </div>
</div>

<script>
/* =====================================================================
   Firebase 설정 — 반드시 본인 Firebase 프로젝트 값으로 교체하세요.
   (Firebase 콘솔 > 프로젝트 설정 > 일반 > 내 앱 > SDK 설정 및 구성)
   ===================================================================== */
const firebaseConfig = {
  apiKey: "AIzaSyB0B1RU5xgPX_g5D9FvQWb45J8TQSTCMXs",
  authDomain: "zim-korea-hr-monthly-update.firebaseapp.com",
  projectId: "zim-korea-hr-monthly-update",
  storageBucket: "zim-korea-hr-monthly-update.firebasestorage.app",
  messagingSenderId: "467109154730",
  appId: "1:467109154730:web:f3f1e925ae60edfe14e5d3"
};

// 관리자로 인정할 이메일 (Firebase Authentication에 이 이메일로 계정을 만드세요)
const ADMIN_EMAIL = "chung.helen@zim.com";

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* ===================================================================== */

const mainEl = document.getElementById('main');

let months = [];
let dataCache = {};
let currentMonth = null;
let saveTimer = null;
let isEditing = true;
let isAdmin = false;
let authInitDone = false;

const MONTH_NAMES_ENG = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

let config = {
  topMetrics: [
    { id: 'hc', label: 'Headcount (HC)', type: 'budget_actual' },
    { id: 'efficiency', label: 'Efficiency (%)', type: 'budget_actual' },
    { id: 'overtime', label: 'Overtime (hrs)', type: 'budget_actual' },
    { id: 'budgetUsage', label: 'Budget (Accumulate, USD)', type: 'budget_actual' }
  ],
  categories: [
    { key: 'cb', short: 'C&B', full: 'Compensation & Benefits' },
    { key: 'ld', short: 'L&D', full: 'Learning & Development' },
    { key: 'ta', short: 'TA', full: 'Talent Acquisition' }
  ]
};

function monthLabel(m){
  if(!m) return '';
  const [y, mo] = m.split('-');
  return `${MONTH_NAMES_ENG[parseInt(mo,10)-1]} ${y}`;
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

function fmtNum(n, decimals){
  decimals = decimals || 0;
  if(n === null || n === undefined || isNaN(n)) return '-';
  return Number(n).toLocaleString('en-US', {
    minimumFractionDigits: decimals,
    maximumFractionDigits: decimals
  });
}

/* ---------- 로그인 UI ---------- */
function updateAuthUI(){
  const link = document.getElementById('adminLoginLink');
  if(!link) return;
  link.textContent = isAdmin ? `Logout (${auth.currentUser.email})` : 'Admin Login';
  renderAddMonthUI();
}

function renderAddMonthUI(){
  const area = document.getElementById('addMonthArea');
  if(!area) return;
  if(!isAdmin){ area.innerHTML = ''; return; }

  area.innerHTML = `
    <div style="padding: 4px 0 14px;">
      <label style="display: block; font-size: 12px; color: var(--slate); margin-bottom: 6px;">Add Month</label>
      <div style="display:flex; gap:6px;">
        <input type="month" id="newMonthInput" style="flex:1; background:#101722; border:1px solid #3A4557; color:#EDE9DF; border-radius:6px; padding:8px; font-size:13px;">
        <button id="addMonthBtn" style="background:var(--amber); color:#1B2430; border:none; border-radius:6px; padding:0 14px; font-weight:700; cursor:pointer; font-size:13px;">+</button>
      </div>
    </div>
  `;

  document.getElementById('addMonthBtn').onclick = async () => {
    const val = document.getElementById('newMonthInput').value;
    if(!val) return;
    if(!months.includes(val)){
      months.push(val);
      months.sort().reverse();
      await loadMonth(val);
      await saveIndex();
    }
    renderMonthList();
    await selectMonth(val);
  };
}

document.getElementById('adminLoginLink').onclick = (e) => {
  e.preventDefault();
  if(isAdmin){
    auth.signOut();
  } else {
    document.getElementById('loginError').style.display = 'none';
    document.getElementById('loginModalOverlay').style.display = 'flex';
  }
};
document.getElementById('loginCancelBtn').onclick = () => {
  document.getElementById('loginModalOverlay').style.display = 'none';
};
document.getElementById('loginSubmitBtn').onclick = async () => {
  const email = document.getElementById('loginEmail').value.trim();
  const pw = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  try{
    await auth.signInWithEmailAndPassword(email, pw);
    document.getElementById('loginModalOverlay').style.display = 'none';
    document.getElementById('loginEmail').value = '';
    document.getElementById('loginPassword').value = '';
  }catch(err){
    console.error('로그인 에러:', err);
    errEl.textContent = '로그인 실패 (' + (err.code || 'unknown') + '): ' + (err.message || '');
    errEl.style.display = 'block';
  }
};

auth.onAuthStateChanged(async (user) => {
  isAdmin = !!(user && user.email === ADMIN_EMAIL);
  updateAuthUI();
  if(!authInitDone){
    authInitDone = true;
    await init();
  } else {
    isEditing = isAdmin;
    if(currentMonth) renderMain();
  }
});

/* ---------- Firestore 저장소 ---------- */
async function loadConfig(){
  try{
    const doc = await db.collection('meta').doc('config').get();
    if(doc.exists){
      const parsed = doc.data();
      if(parsed.topMetrics && parsed.categories) config = parsed;
    }
  }catch(e){ console.error('loadConfig error', e); }
}

async function loadIndex(){
  try{
    const doc = await db.collection('meta').doc('index').get();
    months = (doc.exists && doc.data().months) ? doc.data().months : [];
  }catch(e){ months = []; }

  if(months.length === 0){
    months = ['2026-07'];
    if(isAdmin) await saveIndex();
  }
  months.sort().reverse();
}

async function saveIndex(){
  if(!isAdmin) return;
  try{ await db.collection('meta').doc('index').set({ months }); }catch(e){ console.error('saveIndex error', e); }
}

function freshMonthData(monthKey){
  const topValues = {};
  const is2026 = monthKey && monthKey.startsWith('2026');

  config.topMetrics.forEach(m=>{
    if(m.type === 'budget_actual'){
      let defaultBudget = '';
      if(is2026){
        if(m.id === 'hc' || m.label.toLowerCase().includes('headcount')) defaultBudget = '84';
        if(m.id === 'efficiency' || m.label.toLowerCase().includes('efficiency')) defaultBudget = '116';
      }
      topValues[m.id] = { budget: defaultBudget, actual: '' };
    } else {
      topValues[m.id] = { value: '' };
    }
  });

  const categories = {};
  config.categories.forEach(c=>{ categories[c.key] = { summary: '', images: [] }; });
  return { topValues, categories };
}

function normalizeMonthData(raw, monthKey){
  const fresh = freshMonthData(monthKey);
  const data = raw ? JSON.parse(JSON.stringify(raw)) : {};
  data.topValues = data.topValues || {};
  data.categories = data.categories || {};

  const is2026 = monthKey && monthKey.startsWith('2026');

  config.topMetrics.forEach(m=>{
    if(!data.topValues[m.id]) {
      data.topValues[m.id] = fresh.topValues[m.id];
    } else if(is2026 && m.type === 'budget_actual') {
      if(!data.topValues[m.id].budget){
        if(m.id === 'hc' || m.label.toLowerCase().includes('headcount')) data.topValues[m.id].budget = '84';
        if(m.id === 'efficiency' || m.label.toLowerCase().includes('efficiency')) data.topValues[m.id].budget = '116';
      }
    }
  });

  config.categories.forEach(c=>{
    if(!data.categories[c.key]) {
      data.categories[c.key] = { summary: '', images: [] };
    } else {
      if(!data.categories[c.key].images) data.categories[c.key].images = [];
    }
  });
  return data;
}

async function loadMonth(m){
  if(dataCache[m]) return dataCache[m];
  try{
    const doc = await db.collection('reports').doc(m).get();
    const parsed = doc.exists ? doc.data() : null;
    dataCache[m] = normalizeMonthData(parsed, m);
  }catch(e){
    console.error('loadMonth error', e);
    dataCache[m] = freshMonthData(m);
  }
  return dataCache[m];
}

async function saveMonth(m){
  if(!isAdmin){ setSaveStatus('View only'); return; }
  try{
    await db.collection('reports').doc(m).set(dataCache[m]);
    setSaveStatus('Saved · ' + new Date().toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'}));
  }catch(e){
    console.error('saveMonth error', e);
    setSaveStatus('Save failed — try again');
    alert('저장에 실패했습니다. 이미지 용량이 너무 크거나(1MB 제한) 네트워크 문제일 수 있어요.\n에러: ' + (e.message || e.code || e));
  }
}

function queueSave(m){
  if(!isAdmin) return;
  setSaveStatus('Saving…');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{ saveMonth(m); }, 600);
}

function setSaveStatus(text){
  const el = document.querySelector('.save-status');
  if(el) el.textContent = text;
}

function toggleFormState(disabled){
  const inputs = document.querySelectorAll('.main input, .main textarea, .main button:not(#editBtn):not(#saveBtn)');
  inputs.forEach(el => { el.disabled = disabled; });
}

/* ---------- 렌더링 로직 ---------- */
function renderMonthList(){
  const selectEl = document.getElementById('monthSelect');
  if(!selectEl || !months || months.length === 0) return;

  selectEl.innerHTML = '';
  months.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m;
    opt.textContent = monthLabel(m);
    opt.style.background = '#1e293b';
    opt.style.color = '#fff';
    if(m === currentMonth) opt.selected = true;
    selectEl.appendChild(opt);
  });

  selectEl.onchange = (e) => {
    selectMonth(e.target.value);
  };

  const deleteBtn = document.getElementById('deleteMonthBtn');
  if(deleteBtn){
    deleteBtn.style.display = isAdmin ? 'block' : 'none';
    deleteBtn.onclick = () => { if(currentMonth) deleteMonth(currentMonth); };
  }
}

async function deleteMonth(m){
  if(!isAdmin || !m) return;
  const ok = confirm(`${monthLabel(m)} 리포트를 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`);
  if(!ok) return;

  try{
    await db.collection('reports').doc(m).delete();
  }catch(e){
    console.error('deleteMonth error', e);
    alert('삭제 중 오류가 발생했습니다: ' + (e.message || e.code || e));
    return;
  }

  months = months.filter(x => x !== m);
  delete dataCache[m];
  await saveIndex();

  if(currentMonth === m){
    currentMonth = months.length > 0 ? months[0] : null;
  }

  renderMonthList();
  if(currentMonth){
    await selectMonth(currentMonth);
  } else {
    renderMain();
  }
}

async function selectMonth(m){
  currentMonth = m;
  await loadMonth(m);
  renderMonthList();
  renderMain();
}

function renderMain(){
  if(!currentMonth){
    mainEl.innerHTML = `<div class="empty-state">
      <h2>No report selected</h2>
      <p>Select a month to start tracking your metrics.</p>
    </div>`;
    return;
  }

  const [curYear, curMonthNum] = currentMonth.split('-');
  const startMonthEng = MONTH_NAMES_ENG[0];
  const curMonthEng = MONTH_NAMES_ENG[parseInt(curMonthNum, 10) - 1];

  const editControlsHtml = isAdmin ? `
    <button class="btn btn-ghost" id="editBtn">Edit</button>
    <button class="btn" id="saveBtn" style="background:var(--teal); color:#fff;">Save</button>
  ` : '';

  mainEl.innerHTML = `
    <div class="main-header">
      <h2 class="main-title">${monthLabel(currentMonth)}</h2>
      <div class="save-area">
        <span class="save-status">${isAdmin ? (isEditing ? 'Editing…' : 'Saved') : 'View only'}</span>
        ${editControlsHtml}
      </div>
    </div>

    <div class="section-label">
      <span>Monthly Trend (${startMonthEng} ~ ${curMonthEng} ${curYear})</span>
    </div>

    <div class="charts-grid" id="chartsGrid"></div>

    <p class="section-label">MONTHLY Highlights</p>
    <div id="highlightsTableArea"></div>
    <p class="hint">${isAdmin ? 'Click Edit to make changes. Click Save when finished to lock inputs.' : 'This report is read-only. Contact HR to request changes.'}</p>
  `;

  if(isAdmin){
    document.getElementById('editBtn').onclick = () => {
      isEditing = true;
      toggleFormState(false);
      setSaveStatus('Editing…');
    };

    document.getElementById('saveBtn').onclick = async () => {
      if (currentMonth) {
        await saveMonth(currentMonth);
        isEditing = false;
        toggleFormState(true);
      }
    };
  }

  renderHighlightsTable();
  renderAllCharts();

  if(!isAdmin || !isEditing) {
    toggleFormState(true);
  }
}

/* ---------- MONTHLY Highlights 렌더링 ---------- */
function renderHighlightsTable(){
  const area = document.getElementById('highlightsTableArea');
  if(!area) return;

  const data = dataCache[currentMonth];

  let html = `
    <div class="highlights-table-wrap">
      <table class="highlights-table">
        <thead>
          <tr>
            <th style="width:180px;">Category</th>
            <th>Monthly Summary & Attachments</th>
          </tr>
        </thead>
        <tbody>
  `;

  config.categories.forEach(c => {
    const catData = data.categories[c.key] || { summary: '', images: [] };
    data.categories[c.key] = catData;

    html += `
      <tr data-cat-key="${c.key}">
        <td class="cat-header-cell">
          <div>${escapeHtml(c.short)}</div>
          <div class="cat-header-sub">${escapeHtml(c.full)}</div>
        </td>
        <td>
          <textarea class="summary-textarea" ${isAdmin ? '' : 'disabled'} placeholder="Enter key accomplishments or notes for ${escapeHtml(c.short)}..." oninput="updateSummary('${c.key}', this.value)">${escapeHtml(catData.summary)}</textarea>

          <div class="image-attach-area">
            ${isAdmin ? `
              <button class="add-img-btn" onclick="triggerImgUpload('${c.key}')">📷 Add Image</button>
              <input type="file" id="imgInput-${c.key}" accept="image/*" style="display:none;" onchange="handleImageUpload('${c.key}', this)">
            ` : ''}
            <div class="img-grid" id="imgGrid-${c.key}"></div>
          </div>
        </td>
      </tr>
    `;
  });

  html += `
        </tbody>
      </table>
    </div>
  `;

  area.innerHTML = html;

  config.categories.forEach(c => {
    renderImagesForCategory(c.key);
  });
}

function updateSummary(catKey, val){
  if(!isAdmin) return;
  const catData = dataCache[currentMonth].categories[catKey];
  catData.summary = val;
  queueSave(currentMonth);
}

/* ---------- 이미지 관리 ---------- */
function triggerImgUpload(catKey){
  if(!isAdmin) return;
  const input = document.getElementById(`imgInput-${catKey}`);
  if(input) input.click();
}

function handleImageUpload(catKey, inputEl){
  if(!isAdmin) return;
  if(inputEl.files && inputEl.files[0]){
    const file = inputEl.files[0];
    const reader = new FileReader();
    reader.onload = function(e){
      const img = new Image();
      img.onload = function(){
        // 저장 용량 제한(Firestore 문서당 1MB)에 걸리지 않도록 이미지를 축소·압축
        const maxDim = 900;
        let w = img.width, h = img.height;
        if(w > maxDim || h > maxDim){
          if(w > h){ h = Math.round(h * maxDim / w); w = maxDim; }
          else { w = Math.round(w * maxDim / h); h = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, w, h);
        ctx.drawImage(img, 0, 0, w, h);
        const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.7);

        const catData = dataCache[currentMonth].categories[catKey];
        if(!catData.images) catData.images = [];
        catData.images.push(compressedDataUrl);
        queueSave(currentMonth);
        renderImagesForCategory(catKey);
        inputEl.value = '';
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }
}

function positionZoomOverlay(e){
  const overlay = document.getElementById('hoverZoomOverlay');
  if(!overlay) return;
  const offset = 18;
  let left = e.clientX + offset;
  let top = e.clientY + offset;
  const maxLeft = window.innerWidth - 400;
  const maxTop = window.innerHeight - 400;
  if(left > maxLeft) left = e.clientX - offset - 380;
  if(left < 0) left = 8;
  if(top > maxTop) top = Math.max(8, maxTop);
  overlay.style.left = left + 'px';
  overlay.style.top = top + 'px';
}

function openImageLightbox(url){
  document.getElementById('lightboxImg').src = url;
  document.getElementById('imageLightboxOverlay').style.display = 'flex';
}

function closeImageLightbox(){
  document.getElementById('imageLightboxOverlay').style.display = 'none';
}

document.addEventListener('keydown', (e) => {
  if(e.key === 'Escape') closeImageLightbox();
});

function renderImagesForCategory(catKey){
  const gridEl = document.getElementById(`imgGrid-${catKey}`);
  if(!gridEl) return;
  gridEl.innerHTML = '';

  const catData = dataCache[currentMonth].categories[catKey];
  if(!catData.images) return;

  catData.images.forEach((imgUrl, index) => {
    const container = document.createElement('div');
    container.className = 'img-thumb-container';
    container.innerHTML = `
  <img
      src="${imgUrl}"
      alt="Attached snippet"
      class="preview-image"
      onclick="openImageLightbox(this.src)">
  ${isAdmin ? `<button class="img-del-btn" title="Delete image">×</button>` : ''}
`;
    if(isAdmin){
      container.querySelector('.img-del-btn').onclick = () => {
        catData.images.splice(index, 1);
        queueSave(currentMonth);
        renderImagesForCategory(catKey);
      };
    }

    container.addEventListener('mouseenter', (e) => {
      const overlay = document.createElement('div');
      overlay.className = 'hover-zoom-overlay';
      overlay.id = 'hoverZoomOverlay';
      const bigImg = document.createElement('img');
      bigImg.src = imgUrl;
      overlay.appendChild(bigImg);
      document.body.appendChild(overlay);
      positionZoomOverlay(e);
    });
    container.addEventListener('mousemove', positionZoomOverlay);
    container.addEventListener('mouseleave', () => {
      const overlay = document.getElementById('hoverZoomOverlay');
      if(overlay) overlay.remove();
    });

    gridEl.appendChild(container);
  });
}

/* ---------- 차트 및 SVG 렌더링 ---------- */
async function ensureAllMonthsLoaded(){
  for(const m of months){
    if(!dataCache[m]) await loadMonth(m);
  }
}

function getMetricValue(d, metricDef){
  if(!d) return { actual: null, budget: null };
  if(metricDef.type === 'budget_actual'){
    const v = d.topValues[metricDef.id];
    if(!v) return { actual: null, budget: null };
    const act = parseFloat(v.actual);
    const bdg = parseFloat(v.budget);
    return {
      actual: isNaN(act) ? null : act,
      budget: isNaN(bdg) ? null : bdg
    };
  }
  return { actual: null, budget: null };
}

function renderSingleChartSVG(points, currentBudget){
  if(!points || points.length === 0){
    return `<div class="chart-empty">No data available for Jan ~ current month.</div>`;
  }

  const allVals = points.map(p=>p.actual).concat(currentBudget !== null ? [currentBudget] : []);
  const max = Math.max(...allVals, 0.0001);

  const w = 340, h = 150, padL = 10, padB = 22;
  const count = points.length;
  const barGap = count > 8 ? 4 : 8;
  const barW = Math.max(10, (w - padL*2 - barGap*(count-1)) / count);

  let x = padL;
  let bars = '';
  let labels = '';
  let budgetLine = '';

  if(currentBudget !== null && currentBudget > 0){
    const budgetY = h - padB - (currentBudget / max) * (h - padB - 28);
    budgetLine = `
      <line x1="${padL - 2}" y1="${budgetY}" x2="${w - padL + 2}" y2="${budgetY}" stroke="#B8862E" stroke-width="1.2" stroke-dasharray="3,3" opacity="0.85"></line>
      <text x="${w - padL}" y="${budgetY - 3}" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="8" font-weight="700" fill="#B8862E">Bdg ${fmtNum(currentBudget, 0)}</text>
    `;
  }

  const actualFontSize = count > 8 ? "8" : "9.5";
  const monthFontSize = count > 8 ? "8" : "9";

  points.forEach(p=>{
    const barH = (p.actual / max) * (h - padB - 28);
    const y = h - padB - barH;
    const mIdx = parseInt(p.month.split('-')[1], 10) - 1;
    const mEng = MONTH_NAMES_ENG[mIdx];

    bars += `<rect x="${x}" y="${y}" width="${barW}" height="${barH}" rx="2" fill="var(--teal)"></rect>`;
    bars += `<text x="${x + barW/2}" y="${y - 3}" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="${actualFontSize}" font-weight="700" fill="#2F6F6C">${fmtNum(p.actual, 0)}</text>`;
    labels += `<text x="${x + barW/2}" y="${h - 5}" text-anchor="middle" font-family="Inter, sans-serif" font-size="${monthFontSize}" font-weight="600" fill="#6B7280">${mEng}</text>`;

    x += barW + barGap;
  });

  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;">
    <line x1="${padL}" y1="${h-padB}" x2="${w-padL}" y2="${h-padB}" stroke="#DCD6C9" stroke-width="1"></line>
    ${budgetLine}
    ${bars}
    ${labels}
  </svg>`;
}

function renderAllCharts(){
  const container = document.getElementById('chartsGrid');
  if(!container || !currentMonth) return;
  container.innerHTML = '';

  const [targetYear, targetMonthStr] = currentMonth.split('-');
  const targetMonthNum = parseInt(targetMonthStr, 10);

  // 1월 ~ 선택된 월까지만 표시
  const filteredMonths = [];
  for(let m = 1; m <= targetMonthNum; m++){
    const mKey = `${targetYear}-${String(m).padStart(2, '0')}`;
    filteredMonths.push(mKey);
  }

  const curData = dataCache[currentMonth];

  config.topMetrics.forEach(metric => {
    const card = document.createElement('div');
    card.className = 'chart-card';

    const points = filteredMonths.map(m => {
      const val = getMetricValue(dataCache[m], metric);
      return { month: m, actual: val.actual };
    }).filter(p => p.actual !== null);

    const curMetricVal = getMetricValue(curData, metric);
    const curActualRaw = curData.topValues[metric.id] ? curData.topValues[metric.id].actual : '';
    const curBudgetRaw = curData.topValues[metric.id] ? curData.topValues[metric.id].budget : '';
    const curBudget = curMetricVal.budget;

    let badgeHtml;
    if(isAdmin){
      badgeHtml = `
        <div class="budget-badge-group">
          <label style="display:flex;align-items:center;gap:4px;">Bdg
            <input type="number" class="metric-input" data-metric="${metric.id}" data-field="budget" value="${curBudgetRaw !== undefined ? curBudgetRaw : ''}" style="width:56px;padding:3px 5px;border:1px solid var(--hair);border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:11px;">
          </label>
          <label style="display:flex;align-items:center;gap:4px;">Act
            <input type="number" class="metric-input" data-metric="${metric.id}" data-field="actual" value="${curActualRaw !== undefined ? curActualRaw : ''}" style="width:56px;padding:3px 5px;border:1px solid var(--hair);border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:11px;">
          </label>
        </div>
      `;
    } else {
      const curActual = fmtNum(curMetricVal.actual, 0);
      badgeHtml = `
        <div class="budget-badge-group">
          <span class="budget-badge">Bdg: ${fmtNum(curBudget, 0)}</span>
          <span class="budget-badge actual">Act: ${curActual}</span>
        </div>
      `;
    }

    card.innerHTML = `
      <div class="chart-header">
        <span class="chart-title">${escapeHtml(metric.label)}</span>
        ${badgeHtml}
      </div>
      <div>${renderSingleChartSVG(points, curBudget)}</div>
    `;

    container.appendChild(card);
  });

  if(isAdmin){
    container.querySelectorAll('.metric-input').forEach(inp => {
      inp.oninput = (e) => {
        const metricId = e.target.dataset.metric;
        const field = e.target.dataset.field;
        const val = e.target.value;
        const dataObj = dataCache[currentMonth];
        if(!dataObj.topValues[metricId]) dataObj.topValues[metricId] = { budget: '', actual: '' };
        dataObj.topValues[metricId][field] = val;
        queueSave(currentMonth);
      };
    });
  }
}

/* ---------- 초기화 실행 (Firebase 로그인 상태 확정 후 실행) ---------- */
async function init(){
  await loadConfig();
  await loadIndex();
  await ensureAllMonthsLoaded();

  if(months.length > 0){
    currentMonth = months[0];
  }

  renderMonthList();
  if(currentMonth) {
    await selectMonth(currentMonth);
  } else {
    renderMain();
  }
}
</script>
